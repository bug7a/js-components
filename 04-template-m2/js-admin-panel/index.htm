        <!--

        /* Bismillah */
        
        - Eğer left menu, mainView dışında açılır ise button seçilmesin.
        
        -->
        
        <script>

        let loginPage = null;
        let userData = null;
        
        window.onload = function() {

            page.color = "black";

            checkIfLoggedIn({
                onSuccess: initAdminPanel, // Show Panel Home Page
                onFail: initLoginView,
            });

        };

        const fillTestData = function() {

            // TEST DATA: Fill the user data
            loginPage.loginEmail.setInputValue("bugra.ozden@gmail.com");
            loginPage.loginPassword.setInputValue("123456");
            // Call manuel to check form with out edit
            loginPage.loginEmail.onEdit();

        };

        const initLoginView = function() {
                
            // Show Login Page
            loginPage = LoginPage({
                panelWidth: 420,
                primaryColor: "#2C5A38",
                panelName: "MY PANEL v25.08.11",
                onLoginClick: onLoginClick,
                onSignupClick: onSignupClick,
                showPasswordIconFile: "../../comp-m2/password-input-b/show-btn.png",
                hidePasswordIconFile: "../../comp-m2/password-input-b/hide-btn.png",
                waitingIcon: "../../comp-m2/waiting/clock3.png",
                signupPasswordParams: {
                    minChar: 8,
                    minCharWarningText: "Password must be at least 8 characters",
                    mustUseNumber: 1,
                    mustUseLetter: 1,
                    mustUseUppercase: 0,
                    mustUseLowercase: 0,
                    mustUseSpecialChar: 0,
                }
            });

            const _googleIconFile = "https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg";
            const _appleIconFile = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSRsP-EH-Fc-gjQMFgxj4g1pkFGVCK8Y2deHA&s";

            // Add custom login buttons:
            loginPage.createButtonWithIcon("Sign in with Google", _googleIconFile, onLoginWithGoogle);
            loginPage.createButtonWithIcon("Sign in with Apple", _appleIconFile, onLoginWithApple);

            // TEST
            fillTestData();

        };

        const initAdminPanel = function() {

            if (!userData) { logout(); return 0; }

            // Main Content
            window.mainView = MainView();

            // Top Bar
            window.topBar = TopBar({
                panelIcon: "assets/panel-icon.png",
                panelName: "MY PANEL",
                backgroundColor: "#2C5A38", //"#3D7A6B", // "#344f6c", "#583432", "#2C5A38"
                tab_border: 1, // 1, 0
            });

            // Right Content
            window.rightView = RightView();

            // Menu items
            const menuItems = [
                { key: HomePage.KEY, type: "button", text: "Home", icon: "assets/left-menu/home.png" },
                { key: ReportsPage.KEY, type: "button", text: "Reports", icon: "assets/left-menu/reports.png" },
                { key: "divider1", type: "header", text: "CONTENTS" },
                { key: UsersPage.KEY, type: "button", text: "Users", icon: "assets/left-menu/data-table.png" },
                { key: ContentsPage.KEY, type: "button", text: "Contents", icon: "assets/left-menu/data-table.png" },
                { key: "divider1", type: "header", text: "MODULES" },
                { key: "module1", type: "button", text: "Module 1 (Main)", icon: "assets/left-menu/brick.png" },
                { key: "module2", type: "button", text: "Module 2 (Full)", icon: "assets/left-menu/brick.png", dontSelect: 1 },
                { key: "module3", type: "button", text: "Module 3 (Right)", icon: "assets/left-menu/brick.png", dontSelect: 1 },
                { key: "divider1", type: "header", text: "URL MODULES" },
                { key: "url1", type: "button", text: "HandBook", icon: "assets/left-menu/bolt.png", dontSelect: 1 },
                { key: "url2", type: "button", text: "Personal Expense", icon: "assets/left-menu/code.png", dontSelect: 1 },
                { key: "url3", type: "button", text: "ToDo List", icon: "assets/left-menu/code.png", dontSelect: 1 },
            ];

            // Left Menu
            window.leftMenu = LeftMenu({
                items: menuItems,
                onItemClick: function(item) {
                    //println("Clicked Key: " + item.key);
                    openPageByKey(item.key);
                }
            });

            // Add item to bottom
            leftMenu.addItemToBottom({ key: SettingsPage.KEY, type: "button", text: "Settings", icon: "assets/left-menu/setting.png" });

            
            // Add random items to top
            /*
            for(var i = 0; i < 30; i++) {
                leftMenu.addItemToTop({ key: "aaa" + i, type: "button", text: "Settings" + i, icon: "assets/data-table.png" });
            }
            */

            // Full Content
            window.fullView = FullView();

            // Waiting
            window.waiting = Waiting({
                animated: 1, 
                coverBackgroundColor: "rgba(0,0,0,0.6)",
                waitingIcon: "../../comp-m2/waiting/clock3.png", 
            });
            waiting.icon.elem.style.filter = "invert(100%)";

            // Select home
            leftMenu.setSelectedItem(HomePage.KEY);
            // Open home page
            openPageByKey(HomePage.KEY);

        };

        window.openPageByKey = function(key) {

            if (!userData) { logout(); return 0; }

            // Eğer sayfa zaten açıkken çağırılır ise, sadece sayfayı kapatır ve 0 döner.
            const shouldOpenRightView = () => {

                if (rightView.isShown(key)) {
                    rightView.hide();
                    rightView.clean();
                    return 0;

                } else {
                    return 1;
                    // Sayfa kapalı ve açmak için uygun.
                }

            };

            switch (key) {

                case "logout":
                    logout();
                    break;

                case HomePage.KEY:
                    HomePage();
                    break;

                case ContentsPage.KEY:
                    ContentsPage();
                    break;

                case NotificationsPage.KEY:
                    if(shouldOpenRightView()) { // If 0 then just close the page
                        NotificationsPage();
                    }
                    break;

                case ReportsPage.KEY:
                    ReportsPage();
                    break;

                case SettingsPage.KEY:
                    SettingsPage();
                    break;

                case UsersPage.KEY:
                    UsersPage();
                    break;

                case UserActionsPage.KEY:
                    if(shouldOpenRightView()) { // If 0 then just close the page
                        UserActionsPage();
                    }
                    break;

                case "module1":
                    ModulePage({
                        pageKey: key,
                        moduleURL: "module1/index.htm",
                        container: mainView,
                    });
                    break;

                case "module2":
                    ModulePage({
                        pageKey: key,
                        moduleURL: "module2/index.htm",
                        container: fullView,
                    });
                    //fullView.color = "white";
                    break;

                case "module3":
                    if(shouldOpenRightView()) { // If 0 then just close the page
                        ModulePage({
                            pageKey: key,
                            moduleURL: "module3/index.htm",
                            container: rightView,
                        });
                        rightView.setWidth(800);
                    }
                    break;

                case "module4":
                    if (!mainView.isShown(key)) { // If already opened dont open again.
                        ModulePage({
                            pageKey: key,
                            moduleURL: "module4/index.htm",
                            container: mainView,
                        });

                        leftMenu.clearSelection(); // mainView da açılacağı için, left menu deki seçimi temizle.
                    }
                    break;

                case "module5":
                    if(shouldOpenRightView()) { // If 0 then just close the page
                        ModulePage({
                            pageKey: key,
                            moduleURL: "module5/index.htm",
                            container: rightView,
                        });
                        rightView.setWidth(600);
                    }
                    break;
                
                case "url1":
                    ModulePage({
                        pageKey: key,
                        moduleURL: "https://bug7a.github.io/basic.js-handbook/",
                        container: mainView,
                    });
                    break;

                case "url2":
                    if(shouldOpenRightView()) { // If 0 then just close the page
                        ModulePage({
                            pageKey: key,
                            moduleURL: "https://bug7a.github.io/expense/",
                            container: rightView,
                        });
                        rightView.setWidth(450);
                    }
                    break;

                case "url3":
                    if(shouldOpenRightView()) { // If 0 then just close the page
                        ModulePage({
                            pageKey: key,
                            moduleURL: "https://bug7a.github.io/javascript-single-page-application-example/sample1.htm",
                            container: rightView,
                        });
                        rightView.setWidth(450);
                        rightView.page.elem.style.filter = "invert(100%)";
                        rightView.page.elem.style.borderLeft = "1px solid rgba(0,0,0,0.15)";
                    }
                    break;

            }

        };

        const checkIfLoggedIn = function(callback) {

            // callback: { onSuccess: func, onFail: func }

            // TODO: Check logged in with your service

            // TEST LOGIN:
            userData = basic.storage.load("appid_login");

            if (userData) {
                callback.onSuccess();
            } else {
                callback.onFail();
            }

        };

        window.logout = function() {

            // TEST LOGIN:
            userData = null;
            basic.storage.save("appid_login", userData);

            // Try to logout with your service
            window.location.reload();

        };

        // Actions
        const onLoginClick = function() {

            loginPage.showAlert("login");

            const email = loginPage.loginEmail.getInputValue();
            const password = loginPage.loginPassword.getInputValue();

            if (!email || !password) { loginPage.showAlert("Please enter email and password"); return; }

            const onSuccess = function() {

                window.location.reload();

            };

            const onFail = function(message) {
                loginPage.showAlert("Login failed: " + message);
            };

            loginPage.waiting.show();

            try {
                
                // TEST LOGIN:
                userData = { user: "test" };
                basic.storage.save("appid_login", userData);

                // TODO: Try to login with your service
                onSuccess();
                //onFail();


            } catch (e) {
                loginPage.showAlert("Login error");

            } finally {
                loginPage.waiting.hide();
            }

        };

        const onSignupClick = function() {

            const email = loginPage.signupEmail.getInputValue();
            const p1 = loginPage.signupPassword.getInputValue();
            const p2 = loginPage.signupPassword2.getInputValue();

            if (!email || !p1 || !p2) { loginPage.showAlert("Please fill all fields"); return; }
            if (p1 !== p2) { loginPage.showAlert("Passwords do not match"); return; }

            const onSuccess = function() {

                loginPage.showAlert("Sign up successful. Check your email to confirm.", "#5DB182");
                loginPage.signupPassword.setInputValue("");
                loginPage.signupPassword2.setInputValue("");
                loginPage.loginEmail.setInputValue(loginPage.signupEmail.getInputValue());
                loginPage.setActiveTab(0);
                loginPage.tabBar.selectByIndex(0);

            };

            const onFail = function(message) {
                loginPage.showAlert("Sign up failed: " + message);
            };

            loginPage.waiting.show();

            try {
                
                // TODO: Try to Signup with your service
                onSuccess();
                //onFail();
                
            } catch (e) {
                loginPage.showAlert("Sign up error");

            } finally {
                loginPage.waiting.hide();
            }

        };

        const onLoginWithGoogle = function() {

            // TODO: Login with Google
            loginPage.showAlert("Logged in with Google.", "#5DB182");

        };

        const onLoginWithApple = function() {

            // TODO: Login with Apple
            loginPage.showAlert("Logged in with Apple.", "#5DB182");

        };


        </script>
